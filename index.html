<!-- ========================= -->
<!-- index.html -->
<!-- ========================= -->
<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <!-- スマホ対応 -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <!-- Google Font -->
  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS -->
  <link
    rel="stylesheet"
    href="style.css"
  >

  <title>
    文化祭企画一覧
  </title>

</head>

<body>

  <!-- ========================= -->
  <!-- モーダル -->
  <!-- ========================= -->

  <div id="modal" class="modal">

    <!-- モーダル本体 -->
    <div class="modal-content">

      <!-- 閉じる -->
      <span
        id="close-modal"
        class="close-button"
      >
        ×
      </span>

      <!-- モーダルヘッダー -->
      <div class="modal-header">

        <!-- カテゴリアイコン -->
        <div id="modal-category-icon">
        </div>

        <!-- タイトル -->
        <h2 id="modal-title">
          仮企画
        </h2>

      </div>

      <!-- 画像 -->
      <div class="modal-image">

        画像エリア

      </div>

      <!-- 情報 -->
      <p id="modal-category"></p>

      <p id="modal-place"></p>

    </div>

  </div>

  <!-- ========================= -->
  <!-- ヘッダー -->
  <!-- ========================= -->

  <header class="site-header">

    <!-- 左側 -->
    <div class="header-left">

      <!-- ロゴ -->
      <img
        src="images/logo.png"
        alt="ロゴ"
        class="header-logo"
      >

      <!-- タイトル -->
      <div class="header-title">

        第69回松尾祭

      </div>

    </div>

    <!-- ハンバーガー -->
    <button id="menu-button">

      ☰

    </button>

    <!-- メニュー -->
    <nav
      class="header-nav"
      id="header-nav"
    >

      <!-- ホーム -->
      <a href="index.html">

        ホーム

      </a>

      <!-- 飲食 -->
      <a href="food.html">

        飲食

      </a>

      <!-- グッズ -->
      <a href="goods.html">

        グッズ

      </a>

     
      <!-- お問合せ -->
      <a href="contact.html">

        お問合せ

      </a>

      <!-- MAP -->
      <a href="map.html">

        MAP

      </a>
 <!-- スケジュール -->
      <div class="dropdown">

        <!-- ボタン -->
        <button
          id="schedule-toggle"
          class="dropdown-button"
        >

          スケジュール ▼

        </button>

        <!-- 開閉メニュー -->
        <div id="schedule-dropdown">

          <a href="student-schedule.html">

            生徒の方はこちら

          </a>

          <a href="visitor-schedule.html">

            一般の方はこちら

          </a>

        </div>

      </div>

    </nav>

  </header>

  <!-- ========================= -->
  <!-- ヒーロー -->
  <!-- ========================= -->

  <section class="hero">

    <!-- オーバーレイ -->
    <div class="hero-overlay">

      <!-- タイトル -->
      <h1 class="hero-title">

        企画一覧

      </h1>

    </div>

  </section>

  <!-- ========================= -->
  <!-- ページ全体 -->
  <!-- ========================= -->

  <div class="container">

    <!-- ページタイトル -->
    <h1>

      文化祭企画一覧

    </h1>

    <!-- ========================= -->
    <!-- 切り替えボタン -->
    <!-- ========================= -->

    <div class="top-buttons">

      <!-- 番号順 -->
      <button
        class="tab-button active"
        data-tab="number"
      >

        番号順

      </button>

      <!-- カテゴリ順 -->
      <button
        class="tab-button"
        data-tab="category"
      >

        カテゴリ順

      </button>

      <!-- 場所順 -->
      <button
        class="tab-button"
        data-tab="place"
      >

        場所順

      </button>

    </div>

    <!-- ========================= -->
    <!-- 表示エリア -->
    <!-- ========================= -->

    <div id="content-area"></div>

  </div>

  <!-- JavaScript -->
  <script src="script.js"></script>

</body>

</html>
